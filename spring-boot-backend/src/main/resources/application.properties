# ================== SERVER ==================
server.port=8081
server.servlet.context-path=/

# ================== DATABASE ==================
spring.datasource.url=jdbc:mysql://localhost:3306/donation_hub?serverTimezone=Asia/Kolkata&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password = welcome
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================== JPA / HIBERNATE ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ================== LOGGING ==================
logging.level.root=INFO
logging.level.com.donatehub=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# ================== JWT ==================
app.jwtSecret=CHANGE_THIS_TO_A_SECURE_32_CHARACTER_SECRET_KEY
app.jwtExpirationInMs=86400000

# ================== CORS ==================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=Content-Type,Authorization
app.cors.allow-credentials=true

# ================== APPLICATION ==================
app.name=DonateHub API
app.version=1.0.0i